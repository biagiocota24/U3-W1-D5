<svg width="180" height="267" viewBox="0 0 180 267" xmlns="http://www.w3.org/2000/svg">
  <title>Cover non disponibile</title>

  <!-- Card background -->
  <rect width="180" height="267" rx="6" fill="#1a1a1a"/>

  <!-- Top red bar -->
  <rect width="180" height="5" rx="0" fill="#E50914"/>

  <!-- N di sfondo -->
  <text
    x="90" y="160"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="100"
    font-weight="700"
    fill="#E50914"
    opacity="0.12"
  >N</text>

  <!-- Icona immagine rotta -->
  <g transform="translate(90, 130)" opacity="0.5">
    <rect x="-28" y="-28" width="56" height="56" rx="4" fill="none" stroke="#888888" stroke-width="1.5"/>
    <circle cx="-10" cy="-10" r="7" fill="none" stroke="#888888" stroke-width="1.5"/>
    <polyline points="-28,14 -8,-6 4,8 14,-4 28,14" fill="none" stroke="#888888" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="-20" y1="-24" x2="20" y2="24" stroke="#E50914" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="20" y1="-24" x2="-20" y2="24" stroke="#E50914" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Testo principale -->
  <text
    x="90" y="210"
    text-anchor="middle"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="9"
    font-weight="500"
    fill="#ffffff"
    letter-spacing="1.5"
  >COVER NON DISPONIBILE</text>

  <!-- Sottotitolo -->
  <text
    x="90" y="228"
    text-anchor="middle"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="8"
    fill="#555555"
    letter-spacing="0.5"
  >N/A · OMDB</text>

  <!-- Badge -->
  <rect x="45" y="238" width="90" height="17" rx="8" fill="#E50914" opacity="0.15"/>
  <text
    x="90" y="250"
    text-anchor="middle"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="8"
    fill="#E50914"
    font-weight="500"
  >Poster assente</text>
</svg>
